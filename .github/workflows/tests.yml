name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 08:00 UTC (5:00 AM ET) - Segunda a Sexta
    - cron: '0 8 * * 1-5'
    # 14:00 UTC (11:00 AM ET) - Segunda a Sexta
    - cron: '0 14 * * 1-5'
    # 20:00 UTC (5:00 PM ET) - Segunda a Sexta
    - cron: '0 20 * * 1-5'
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Selecione quais testes rodar'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - login_only
          - smoke_tests
          - regression_tests

jobs:
  test:
    runs-on: windows-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with Maven
        env:
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
          TEST_SCOPE: ${{ github.event.inputs.test_scope || 'all' }}
        run: |
          if ($env:TEST_SCOPE -eq "all") {
            mvn clean test
          } elseif ($env:TEST_SCOPE -eq "login_only") {
            mvn clean test -Dtest=LoginPage*
          } elseif ($env:TEST_SCOPE -eq "smoke_tests") {
            mvn clean test -Dgroups=smoke
          } elseif ($env:TEST_SCOPE -eq "regression_tests") {
            mvn clean test -Dgroups=regression
          } else {
            mvn clean test
          }

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        with:
          files: target/surefire-reports/*.xml
          check_name: Test Results

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 30

      - name: Comment PR with Test Summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testReports = fs.readdirSync('target/surefire-reports').filter(f => f.endsWith('.xml'));
            if (testReports.length > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Testes executados! Verifique os resultados na aba "Checks".'
              
              });
            }
